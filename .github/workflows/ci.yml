name: memoryblock CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache TS Build Info
        uses: actions/cache@v5
        with:
          path: |
            packages/*/dist
            packages/plugins/*/dist
            packages/*/*.tsbuildinfo
            packages/plugins/*/*.tsbuildinfo
            *.tsbuildinfo
          key: ${{ runner.os }}-ts-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ts-${{ github.ref }}-
            ${{ runner.os }}-ts-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @memoryblock/locale run build && pnpm --filter memoryblock run build && pnpm --filter @memoryblock/plugin-aws run build && pnpm --filter @memoryblock/adapters run build && pnpm --filter @memoryblock/tools run build && pnpm --filter @memoryblock/plugin-agents run build && pnpm -r run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm dev:lint