name: Release to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm (required for OIDC)
        run: npm install -g npm@latest

      - name: Verify versions
        run: |
          node -v
          npm -v
          pnpm -v
          bun -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm dev:build

      - name: Run linting
        run: pnpm dev:lint

      - name: Run failsafe tests
        run: node scripts/failsafe.js --skip-setup

      - name: Copy LICENSE
        run: |
          find packages -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I % cp LICENSE %

      - name: Resolve workspace dependencies
        run: node scripts/resolve-ws-deps.js

      - name: Publish to npm
        run: npm publish --workspaces --include-workspace-root=false --access public