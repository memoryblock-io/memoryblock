name: Release to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm (required for OIDC)
        run: npm install -g npm@latest

      - name: Verify versions
        run: |
          node -v
          npm -v
          pnpm -v
          bun -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm dev:build

      - name: Run verification
        run: pnpm dev:verify --skip-setup

      - name: Copy LICENSE
        run: |
          find packages -mindepth 1 -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I % cp LICENSE %

      - name: Resolve workspace dependencies
        run: node scripts/resolve-ws-deps.js

      - name: Publish to npm
        run: |
          for dir in packages/* packages/plugins/*; do
            if [ -f "$dir/package.json" ]; then
              VERSION=$(node -e "console.log(require('./$dir/package.json').version)")
              TAG="latest"
              
              if [[ "$VERSION" == *-* ]]; then
                TAG=$(echo "$VERSION" | awk -F'-' '{print $2}' | awk -F'.' '{print $1}')
              fi
              
              echo "Publishing $dir v$VERSION under tag: $TAG..."
              
              exit_code=0
              publish_output=$(npm publish "./$dir" --access public --tag "$TAG" 2>&1) || exit_code=$?
              
              if [ $exit_code -ne 0 ]; then
                if echo "$publish_output" | grep -q 'previously published versions\|EPRIVATE'; then
                  echo "::notice::Skipping $dir: Already published or private."
                else
                  echo "::error::Failed to publish $dir"
                  echo "$publish_output"
                  exit 1
                fi
              fi
            fi
          done