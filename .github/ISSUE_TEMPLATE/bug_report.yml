name: 🐞 Bug Report
description: Create a report to help us improve memoryblock
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: memoryblock version
      description: What version of memoryblock are you using? (e.g. 0.1.x)
      placeholder: 0.1.x
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: v20.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS/Browser
      options:
        - macOS / Safari
        - Windows / Edge
        - Linux / Chrome
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide the steps to reproduce the behavior.
      placeholder: |
        1. Run 'memoryblock init'
        2. Add configuration...
        3. Run 'memoryblock build'
        4. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.