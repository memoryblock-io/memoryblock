name: 🐞 Bug Report
description: Create a report to help us improve memoryblock
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: memoryblock version
      description: What version of memoryblock are you using? (e.g. 0.1.x)
      placeholder: 0.1.x
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun & Node.js version
      description: What version of Bun and Node are you running? (e.g. Bun 1.2.0, Node v20)
      placeholder: Bun 1.x, Node v20.x
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running the daemon on? (e.g. macOS Sequoia, Ubuntu 22.04)
      placeholder: macOS Sequoia
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide the steps to reproduce the behavior.
      placeholder: |
        1. Run `mblk init`
        2. Set config block to...
        3. Run `mblk start home`
        4. See error output...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.